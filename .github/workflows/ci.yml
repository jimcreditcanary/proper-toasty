# CI gate for the proper-toasty repo.
#
# Runs on every PR to main + every push to main (so the badge stays
# accurate). Three independent jobs in parallel — lint, typecheck,
# test — each finishing in 30-60s on a warm npm cache. The Vercel
# build only fires after merge, so a missing semicolon fails fast on
# GitHub instead of burning a 3-minute Vercel build.
#
# `concurrency` cancels in-flight runs when a new commit lands on the
# same PR — saves CI minutes when iterating quickly.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --prefer-offline --no-audit
      - run: npm test
